<svg width="1200" height="350" viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg">

<defs>
  <!-- Premium Dark Gradient -->
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0b1120">
      <animate attributeName="stop-color"
               values="#0b1120;#0f172a;#0b1120"
               dur="10s"
               repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#111827">
      <animate attributeName="stop-color"
               values="#111827;#1e293b;#111827"
               dur="10s"
               repeatCount="indefinite"/>
    </stop>
  </linearGradient>

  <!-- Soft Glow -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect width="1200" height="350" fill="url(#bg)" />

<!-- Center Name -->
<text x="50%" y="130"
      text-anchor="middle"
      font-size="48"
      font-family="Verdana"
      fill="white"
      filter="url(#glow)">
  Debapriya Bhanja
</text>

<!-- Animated Role Text -->
<text x="50%" y="175"
      text-anchor="middle"
      font-size="26"
      font-family="Courier New"
      fill="#38bdf8">

  <tspan opacity="0">
    MERN Stack Learner
    <animate attributeName="opacity"
             values="0;1;1;0"
             dur="6s"
             repeatCount="indefinite"/>
  </tspan>

  <tspan opacity="0">
    Java | C++ | Python
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             dur="6s"
             begin="6s"
             repeatCount="indefinite"/>
  </tspan>

  <tspan opacity="0">
    C | DSA | Git & GitHub
    <animate attributeName="opacity"
             values="0;0;0;1;1;0"
             dur="6s"
             begin="12s"
             repeatCount="indefinite"/>
  </tspan>

</text>

<!-- Floating Logos (Background Layer) -->

<!-- React -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg"
       x="100" y="50" width="45" opacity="0.7">
  <animate attributeName="y" values="50;30;50" dur="6s" repeatCount="indefinite"/>
</image>

<!-- Node -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg"
       x="1050" y="60" width="45" opacity="0.7">
  <animate attributeName="y" values="60;40;60" dur="7s" repeatCount="indefinite"/>
</image>

<!-- MongoDB -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mongodb/mongodb-original.svg"
       x="980" y="260" width="45" opacity="0.7">
  <animate attributeName="y" values="260;240;260" dur="8s" repeatCount="indefinite"/>
</image>

<!-- Express -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/express/express-original.svg"
       x="200" y="260" width="45" opacity="0.6">
  <animate attributeName="y" values="260;240;260" dur="7s" repeatCount="indefinite"/>
</image>

<!-- HTML -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg"
       x="350" y="70" width="45" opacity="0.7">
  <animate attributeName="y" values="70;50;70" dur="6s" repeatCount="indefinite"/>
</image>

<!-- CSS -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg"
       x="850" y="90" width="45" opacity="0.7">
  <animate attributeName="y" values="90;70;90" dur="7s" repeatCount="indefinite"/>
</image>

<!-- JS -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg"
       x="700" y="260" width="45" opacity="0.7">
  <animate attributeName="y" values="260;240;260" dur="6s" repeatCount="indefinite"/>
</image>

<!-- Tailwind -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tailwindcss/tailwindcss-plain.svg"
       x="500" y="50" width="45" opacity="0.7">
  <animate attributeName="y" values="50;30;50" dur="7s" repeatCount="indefinite"/>
</image>

<!-- Bootstrap -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/bootstrap/bootstrap-original.svg"
       x="600" y="270" width="45" opacity="0.7">
  <animate attributeName="y" values="270;250;270" dur="6s" repeatCount="indefinite"/>
</image>

<!-- Languages floating -->

<!-- Java -->
<text x="150" y="200" fill="#f89820" font-size="20" opacity="0.6">
  Java
  <animate attributeName="y" values="200;180;200" dur="6s" repeatCount="indefinite"/>
</text>

<!-- Python -->
<text x="950" y="150" fill="#3776AB" font-size="20" opacity="0.6">
  Python
  <animate attributeName="y" values="150;130;150" dur="7s" repeatCount="indefinite"/>
</text>

<!-- C++ -->
<text x="400" y="300" fill="#00599C" font-size="20" opacity="0.6">
  C++
  <animate attributeName="y" values="300;280;300" dur="6s" repeatCount="indefinite"/>
</text>

<!-- DSA -->
<text x="780" y="200" fill="#22c55e" font-size="20" opacity="0.6">
  DSA
  <animate attributeName="y" values="200;180;200" dur="8s" repeatCount="indefinite"/>
</text>

</svg>
