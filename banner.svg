<svg width="1200" height="350" viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg">

<defs>
  <!-- Professional Dark Gradient -->
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="100%" stop-color="#1e293b"/>
  </linearGradient>

  <!-- Glow -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="1200" height="350" fill="url(#bg)" />

<!-- Name -->
<text x="50%" y="140" text-anchor="middle"
      font-size="50"
      font-family="Verdana"
      fill="white"
      filter="url(#glow)">
  Debapriya Bhanja
</text>

<!-- Animated Rotating Text -->
<text x="50%" y="190" text-anchor="middle"
      font-size="26"
      font-family="Courier New"
      fill="#38bdf8">

  <tspan>
    Full Stack Developer
    <animate attributeName="opacity"
             values="1;0;0;0;0;0;0;0"
             dur="16s"
             repeatCount="indefinite"/>
  </tspan>

  <tspan>
    Java
    <animate attributeName="opacity"
             values="0;1;0;0;0;0;0;0"
             dur="16s"
             repeatCount="indefinite"
             begin="2s"/>
  </tspan>

  <tspan>
    C++
    <animate attributeName="opacity"
             values="0;0;1;0;0;0;0;0"
             dur="16s"
             repeatCount="indefinite"
             begin="4s"/>
  </tspan>

  <tspan>
    Python
    <animate attributeName="opacity"
             values="0;0;0;1;0;0;0;0"
             dur="16s"
             repeatCount="indefinite"
             begin="6s"/>
  </tspan>

  <tspan>
    C
    <animate attributeName="opacity"
             values="0;0;0;0;1;0;0;0"
             dur="16s"
             repeatCount="indefinite"
             begin="8s"/>
  </tspan>

  <tspan>
    DSA
    <animate attributeName="opacity"
             values="0;0;0;0;0;1;0;0"
             dur="16s"
             repeatCount="indefinite"
             begin="10s"/>
  </tspan>

  <tspan>
    Git
    <animate attributeName="opacity"
             values="0;0;0;0;0;0;1;0"
             dur="16s"
             repeatCount="indefinite"
             begin="12s"/>
  </tspan>

  <tspan>
    GitHub
    <animate attributeName="opacity"
             values="0;0;0;0;0;0;0;1"
             dur="16s"
             repeatCount="indefinite"
             begin="14s"/>
  </tspan>

</text>

<!-- Floating Logos -->
<!-- React -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg"
       x="100" y="60" width="50">
  <animate attributeName="y" values="60;40;60" dur="6s" repeatCount="indefinite"/>
</image>

<!-- Node -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg"
       x="1050" y="70" width="50">
  <animate attributeName="y" values="70;50;70" dur="7s" repeatCount="indefinite"/>
</image>

<!-- MongoDB -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mongodb/mongodb-original.svg"
       x="950" y="270" width="50">
  <animate attributeName="y" values="270;250;270" dur="8s" repeatCount="indefinite"/>
</image>

<!-- Java -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg"
       x="600" y="260" width="50">
  <animate attributeName="y" values="260;240;260" dur="6s" repeatCount="indefinite"/>
</image>

<!-- Python -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg"
       x="400" y="250" width="50">
  <animate attributeName="y" values="250;230;250" dur="7s" repeatCount="indefinite"/>
</image>

<!-- C++ -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg"
       x="900" y="150" width="50">
  <animate attributeName="y" values="150;130;150" dur="6s" repeatCount="indefinite"/>
</image>

<!-- Git -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg"
       x="250" y="200" width="50">
  <animate attributeName="y" values="200;180;200" dur="6s" repeatCount="indefinite"/>
</image>

<!-- GitHub -->
<image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
       x="1050" y="200" width="50" filter="url(#glow)">
  <animate attributeName="y" values="200;180;200" dur="7s" repeatCount="indefinite"/>
</image>

</svg>
